<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市戰情室儀表板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Share+Tech+Mono&display=swap');
  :root {
    --bg:#0a0e1a; --bg2:#111827; --bg3:#1a2235;
    --border:rgba(99,179,237,0.15); --border2:rgba(99,179,237,0.3);
    --accent:#63b3ed; --accent2:#4fd1c5;
    --text:#e2e8f0; --text2:#94a3b8;
    --green:#48bb78; --red:#fc8181; --amber:#f6ad55; --purple:#b794f4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px;}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:20px;border-bottom:0.5px solid var(--border2);}
  .header-left{display:flex;align-items:center;gap:16px;}
  .logo{width:48px;height:48px;background:linear-gradient(135deg,#1a365d,#2b6cb0);border-radius:12px;border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;}
  .title h1{font-size:22px;font-weight:700;color:var(--accent);letter-spacing:2px;}
  .title p{font-size:12px;color:var(--text2);font-family:'Share Tech Mono',monospace;margin-top:2px;}
  .status-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);font-family:'Share Tech Mono',monospace;}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
  @keyframes spin{to{transform:rotate(360deg);}}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
  .metric-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
  .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .metric-card.blue::before{background:var(--accent);}
  .metric-card.green::before{background:var(--green);}
  .metric-card.red::before{background:var(--red);}
  .metric-card.amber::before{background:var(--amber);}
  .metric-label{font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .metric-value{font-size:28px;font-weight:700;font-family:'Share Tech Mono',monospace;color:var(--text);}
  .metric-sub{font-size:11px;color:var(--text2);margin-top:4px;}
  .section{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .section-title{font-size:13px;font-weight:500;color:var(--accent);letter-spacing:1px;text-transform:uppercase;}
  .refresh-btn{background:transparent;border:0.5px solid var(--border2);color:var(--text2);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent);}
  .stocks-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
  .stock-card{background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:14px 16px;transition:all 0.2s;cursor:pointer;position:relative;}
  .stock-card:hover{border-color:var(--accent);background:#1e2d45;}
  .stock-card .analyze-hint{position:absolute;bottom:8px;right:10px;font-size:10px;color:var(--accent);opacity:0;transition:opacity 0.2s;font-family:'Share Tech Mono',monospace;}
  .stock-card:hover .analyze-hint{opacity:1;}
  .stock-code{font-family:'Share Tech Mono',monospace;font-size:16px;font-weight:700;color:var(--accent);}
  .stock-name{font-size:12px;color:var(--text2);margin-bottom:10px;}
  .stock-price{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;}
  .stock-change{font-family:'Share Tech Mono',monospace;font-size:13px;display:flex;align-items:center;gap:8px;}
  .change-up{color:var(--red);}
  .change-down{color:var(--green);}
  .change-flat{color:var(--text2);}
  .market-status{font-size:10px;padding:2px 8px;border-radius:4px;font-family:'Share Tech Mono',monospace;}
  .market-open{background:rgba(72,187,120,0.15);color:var(--green);border:0.5px solid rgba(72,187,120,0.3);}
  .market-closed{background:rgba(148,163,184,0.15);color:var(--text2);border:0.5px solid rgba(148,163,184,0.3);}
  .price-loading{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text2);animation:blink 1s infinite;}

  /* 分析彈出視窗 */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:80vh;overflow-y:auto;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .modal-title{font-size:16px;font-weight:700;color:var(--accent);}
  .modal-close{background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;}
  .modal-close:hover{color:var(--text);}
  .modal-info{background:var(--bg3);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .modal-info-item{font-size:12px;}
  .modal-info-label{color:var(--text2);margin-bottom:2px;}
  .modal-info-value{font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:500;color:var(--text);}
  .modal-indicators{margin-bottom:16px;}
  .indicator-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);}
  .indicator-row:last-child{border-bottom:none;}
  .indicator-name{font-size:12px;color:var(--text2);}
  .indicator-value{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:500;}
  .indicator-badge{font-size:10px;padding:2px 8px;border-radius:4px;}
  .analyze-btn{width:100%;padding:12px;background:linear-gradient(135deg,#1a365d,#2b6cb0);border:1px solid var(--accent);color:var(--accent);border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;margin-bottom:12px;}
  .analyze-btn:hover{background:linear-gradient(135deg,#2b6cb0,#3182ce);}
  .analyze-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .analyzing-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;}
  .analysis-result{background:var(--bg3);border-radius:8px;padding:16px;font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-wrap;word-break:break-word;margin-top:12px;}
  .analysis-result.success{border:0.5px solid rgba(99,179,237,0.3);}
  .analysis-result.error{border:0.5px solid rgba(252,129,129,0.3);color:var(--red);}
  .send-tg-btn{width:100%;padding:10px;background:transparent;border:0.5px solid var(--accent2);color:var(--accent2);border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;margin-top:8px;}
  .send-tg-btn:hover{background:rgba(79,209,197,0.1);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:8px 12px;color:var(--text2);font-weight:500;font-size:11px;letter-spacing:1px;text-transform:uppercase;border-bottom:0.5px solid var(--border);}
  td{padding:12px;border-bottom:0.5px solid var(--border);vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(99,179,237,0.03);}
  .badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;}
  .badge-green{background:rgba(72,187,120,0.15);color:var(--green);border:0.5px solid rgba(72,187,120,0.3);}
  .badge-red{background:rgba(252,129,129,0.15);color:var(--red);border:0.5px solid rgba(252,129,129,0.3);}
  .badge-amber{background:rgba(246,173,85,0.15);color:var(--amber);border:0.5px solid rgba(246,173,85,0.3);}
  .badge-blue{background:rgba(99,179,237,0.15);color:var(--accent);border:0.5px solid rgba(99,179,237,0.3);}
  .badge-purple{background:rgba(183,148,244,0.15);color:var(--purple);border:0.5px solid rgba(183,148,244,0.3);}
  .analysis-text{font-size:12px;color:var(--text2);line-height:1.6;max-width:400px;white-space:pre-wrap;word-break:break-word;}
  .ticker{font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:500;color:var(--text);}
  .price-text{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--accent2);}
  .time-text{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);}
  .loading{text-align:center;padding:40px;color:var(--text2);font-size:13px;}
  .empty{text-align:center;padding:40px;color:var(--text2);font-size:13px;}
  .error-msg{text-align:center;padding:20px;color:var(--red);font-size:13px;background:rgba(252,129,129,0.05);border-radius:8px;border:0.5px solid rgba(252,129,129,0.2);}
  .rsi-bar{display:flex;align-items:center;gap:8px;}
  .rsi-track{width:60px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
  .rsi-fill{height:100%;border-radius:2px;}
  .stock-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .filter-btn{background:transparent;border:0.5px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:4px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;}
  .filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(99,179,237,0.08);}
  .footer{margin-top:24px;text-align:center;font-size:11px;color:var(--text2);font-family:'Share Tech Mono',monospace;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">📡</div>
    <div class="title">
      <h1>股市戰情室</h1>
      <p>STOCK WAR ROOM · AI POWERED</p>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    <span id="last-update">載入中...</span>

</div>

<div class="metrics">
  <div class="metric-card blue">
    <div class="metric-label">總警報次數</div>
    <div class="metric-value" id="total-count">-</div>
    <div class="metric-sub">歷史累計</div>

  <div class="metric-card green">

<div class="section">

    <div style="display:flex;align-items:center;gap:12px;">
      <span id="market-status-badge" class="market-status market-closed">休市中</span>
      <button class="refresh-btn" onclick="loadPrices()">更新價格</button>

  <div style="font-size:11px;color:var(--text2);margin-bottom:12px;">點擊股票卡片可手動觸發 Claude AI 分析</div>

    <div class="loading">載入股價中...</div>

</div>

<div class="section">
  <div class="section-header">
    <span class="section-title">警報記錄</span>
    <button class="refresh-btn" onclick="loadAlerts()">重新整理</button>
  </div>
  <div class="stock-filter" id="stock-filter">
    <button class="filter-btn active" onclick="filterStock('全部')">全部</button>
  </div>
  <div id="table-container">
    <div class="loading">載入資料中...</div>
  </div>
</div>

<div class="footer">
  ⚠️ 以上資訊僅供參考，最終交易決策請自行負責 · 數據來源：FinMind + Google Sheets + Claude AI
</div>

<!-- 分析彈出視窗 -->
<div class="modal-overlay" id="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">股票分析</span>
      <button class="modal-close" onclick="closeModal()">✕</button>

    <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">
      🤖 Claude AI 即時分析 → Telegram
    </button>
    <div id="analysis-result" style="display:none;"></div>
  </div>
</div>

<script>
const SHEET_ID = '1YLdYoXehvpHA_PT5wT-qw2qnPFY1jPA4uape1HCVHEc';
const SHEET_NAME = 'Sheet1';
const WEBHOOK_URL = 'https://hook.us2.make.com/7giwak8asrrvcpbwqfqpncf16cp8yhmz';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

const WATCH_STOCKS = [
  { code: '3715', name: '定穎投控' },
  { code: '6239', name: '力成' },
  { code: '6456', name: 'GIS-KY' },
  { code: '1815', name: '富喬' },
  { code: '3388', name: '崇越電' },
  { code: '4772', name: '台特化' }
];

let allData = [];
let currentFilter = '全部';
let priceCache = {};
let currentStock = null;
let currentIndicators = null;

function isMarketOpen() {
  const now = new Date();
  const tw = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
  const day = tw.getDay();
  const totalMin = tw.getHours() * 60 + tw.getMinutes();
  return day >= 1 && day <= 5 && totalMin >= 540 && totalMin <= 810;
}

async function fetchPrice(code) {
  try {
    const today = new Date();
    const startDate = new Date(today);
    startDate.setDate(today.getDate() - 40);
    const start = startDate.toISOString().split('T')[0];
    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${code}&start_date=${start}&token=`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.data && data.data.length > 0) {
      return data.data;
    }
  } catch(e) {}
  return null;
}

function calcRSI(closes, period) {
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = closes.length - period; i < closes.length; i++) {
    const diff = closes[i] - closes[i-1];
    if (diff > 0) gains += diff;
    else losses += Math.abs(diff);
  }
  const avgGain = gains / period;
  const avgLoss = losses / period;
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return Math.round((100 - (100 / (1 + rs))) * 10) / 10;
}

function calcEMA(closes, period) {
  if (closes.length < period) return null;
  const k = 2 / (period + 1);
  let ema = closes.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < closes.length; i++) {
    ema = closes[i] * k + ema * (1 - k);
  }
  return Math.round(ema * 100) / 100;
}

function calcMACD(closes) {
  if (closes.length < 26) return null;
  const ema6 = calcEMA(closes, 6);
  const ema13 = calcEMA(closes, 13);
  if (!ema6 || !ema13) return null;
  const macd = Math.round((ema6 - ema13) * 100) / 100;
  return { macd, ema6, ema13 };
}

function calcVolumeSurge(volumes) {
  if (volumes.length < 21) return null;
  const recent = volumes[volumes.length - 1];
  const avg = volumes.slice(-21, -1).reduce((a, b) => a + b, 0) / 20;
  return Math.round((recent / avg) * 100) / 100;
}

function calcIndicators(rawData) {
  const closes = rawData.map(d => d.close);
  const volumes = rawData.map(d => d.Trading_Volume);
  const latest = rawData[rawData.length - 1];

  const rsi6 = calcRSI(closes, 6);
  const ma5 = calcEMA(closes, 5);
  const ma20 = calcEMA(closes, 20);
  const macdData = calcMACD(closes);
  const volSurge = calcVolumeSurge(volumes);

  const goldenCross = ma5 && ma20 && ma5 > ma20;
  const rsiSignal = rsi6 > 70 ? '超買' : rsi6 < 30 ? '超賣' : '中性';
  const macdSignal = macdData ? (macdData.macd > 0 ? '偏多' : '偏空') : '-';
  const volSignal = volSurge ? (volSurge >= 1.5 ? `放量 ${volSurge}x` : `正常 ${volSurge}x`) : '-';

  let overallSignal = '觀望';
  if (rsi6 < 30 && volSurge >= 1.5) overallSignal = '強力進場';
  else if (rsi6 > 70 && macdData && macdData.macd < 0) overallSignal = '強力出場';
  else if (goldenCross && volSurge >= 1.5) overallSignal = '趨勢啟動';
  else if (!goldenCross && rsi6 < 50) overallSignal = '風險警示';

  return {
    price: latest.close,
    date: latest.date,
    rsi6, ma5, ma20,
    macd: macdData ? macdData.macd : null,
    volSurge, goldenCross,
    rsiSignal, macdSignal, volSignal, overallSignal
  };
}

async function openStockModal(stock) {
  currentStock = stock;
  currentIndicators = null;

  document.getElementById('modal-title').textContent = `${stock.code} ${stock.name} · AI 分析`;
  document.getElementById('modal-info').innerHTML = `
    <div class="modal-info-item">
      <div class="modal-info-label">股票代碼</div>
      <div class="modal-info-value">${stock.code}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-label">股票名稱</div>
      <div class="modal-info-value">${stock.name}</div>
    </div>
  `;
  document.getElementById('modal-indicators').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text2);font-size:13px;animation:blink 1s infinite">計算技術指標中...</div>';
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('analysis-result').style.display = 'none';
  document.getElementById('modal-overlay').style.display = 'flex';

  const rawData = await fetchPrice(stock.code);
  if (!rawData || rawData.length < 25) {
    document.getElementById('modal-indicators').innerHTML = '<div style="color:var(--red);font-size:13px;">資料不足，無法計算指標</div>';
    return;
  }

  const ind = calcIndicators(rawData);
  currentIndicators = ind;

  const rsiColor = ind.rsi6 > 70 ? 'var(--red)' : ind.rsi6 < 30 ? 'var(--green)' : 'var(--text)';
  const maColor = ind.goldenCross ? 'var(--green)' : 'var(--red)';
  const volColor = ind.volSurge >= 1.5 ? 'var(--amber)' : 'var(--text2)';

  document.getElementById('modal-info').innerHTML = `
    <div class="modal-info-item">
      <div class="modal-info-label">最新收盤價</div>
      <div class="modal-info-value" style="color:var(--accent2)">${ind.price.toFixed(2)}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-label">資料日期</div>
      <div class="modal-info-value">${ind.date}</div>
    </div>
  `;

  document.getElementById('modal-indicators').innerHTML = `
    <div class="indicator-row">
      <span class="indicator-name">RSI（6日）</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="indicator-value" style="color:${rsiColor}">${ind.rsi6 || '-'}</span>
        <span class="indicator-badge badge-${ind.rsi6 > 70 ? 'red' : ind.rsi6 < 30 ? 'green' : 'blue'}">${ind.rsiSignal}</span>
      </div>
    </div>
    <div class="indicator-row">
      <span class="indicator-name">均線（5日 / 20日）</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="indicator-value">${ind.ma5 || '-'} / ${ind.ma20 || '-'}</span>
        <span class="indicator-badge ${ind.goldenCross ? 'badge-green' : 'badge-red'}" style="color:${maColor}">${ind.goldenCross ? '黃金交叉' : '死亡交叉'}</span>
      </div>
    </div>
    <div class="indicator-row">
      <span class="indicator-name">MACD</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="indicator-value">${ind.macd || '-'}</span>
        <span class="indicator-badge badge-${ind.macd > 0 ? 'green' : 'red'}">${ind.macdSignal}</span>
      </div>
    </div>
    <div class="indicator-row">
      <span class="indicator-name">成交量比（20日均）</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="indicator-value" style="color:${volColor}">${ind.volSurge || '-'}x</span>
        <span class="indicator-badge badge-${ind.volSurge >= 1.5 ? 'amber' : 'blue'}">${ind.volSignal}</span>
      </div>
    </div>
    <div class="indicator-row" style="border-top:0.5px solid var(--border2);margin-top:4px;padding-top:12px;">
      <span class="indicator-name" style="font-weight:500;color:var(--text)">綜合訊號判斷</span>
      <span class="badge ${getBadgeClass(ind.overallSignal)}" style="font-size:12px;">${ind.overallSignal}</span>
    </div>
  `;

  document.getElementById('analyze-btn').disabled = false;
}

async function runAnalysis() {
  if (!currentStock || !currentIndicators) return;

  const btn = document.getElementById('analyze-btn');
  const resultDiv = document.getElementById('analysis-result');

  btn.disabled = true;
  btn.innerHTML = '<span class="analyzing-spinner"></span>Claude 分析中，請稍候...';
  resultDiv.style.display = 'none';

  const ind = currentIndicators;
  const payload = {
    ticker: currentStock.code,
    price: ind.price,
    rsi: ind.rsi6,
    signal: `手動分析-${ind.overallSignal}`,
    time: ind.date,
    extra: `均線：${ind.goldenCross ? '黃金交叉' : '死亡交叉'}，MACD：${ind.macd}，成交量比：${ind.volSurge}x`
  };

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      resultDiv.style.display = 'block';
      resultDiv.className = 'analysis-result success';
      resultDiv.innerHTML = `✅ 分析請求已發送！\n\nClaude AI 正在分析以下資料：\n股票：${currentStock.code} ${currentStock.name}\n價格：${ind.price}\nRSI：${ind.rsi6}（${ind.rsiSignal}）\n均線：${ind.goldenCross ? '黃金交叉' : '死亡交叉'}\nMACD：${ind.macd}（${ind.macdSignal}）\n成交量：${ind.volSurge}x（${ind.volSignal}）\n綜合訊號：${ind.overallSignal}\n\n📱 分析結果將在幾秒內發送到 Telegram！`;
      btn.innerHTML = '✅ 已發送！再次分析';
    } else {
      throw new Error('發送失敗');
    }
  } catch(e) {
    resultDiv.style.display = 'block';
    resultDiv.className = 'analysis-result error';
    resultDiv.innerHTML = `❌ 發送失敗：${e.message}`;
    btn.innerHTML = '🤖 Claude AI 即時分析 → Telegram';
  }

  btn.disabled = false;
}

function closeModal(event) {
  if (!event || event.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').style.display = 'none';
  }
}

function getBadgeClass(signal) {
  if (!signal) return 'badge-blue';
  if (signal.includes('進場')) return 'badge-green';
  if (signal.includes('出場')) return 'badge-red';
  if (signal.includes('趨勢') || signal.includes('黃金')) return 'badge-blue';
  if (signal.includes('風險') || signal.includes('死亡')) return 'badge-amber';
  return 'badge-purple';
}

function getRsiColor(rsi) {
  if (!rsi || isNaN(rsi)) return '#94a3b8';
  if (rsi > 70) return '#fc8181';
  if (rsi < 30) return '#48bb78';
  return '#63b3ed';
}

async function loadPrices() {
  const open = isMarketOpen();
  document.getElementById('market-status-badge').textContent = open ? '交易中' : '休市中';
  document.getElementById('market-status-badge').className = `market-status ${open ? 'market-open' : 'market-closed'}`;

  const grid = document.getElementById('stocks-grid');
  grid.innerHTML = WATCH_STOCKS.map(s =>
    `<div class="stock-card" id="card-${s.code}">
      <div style="margin-bottom:4px;"><span class="stock-code">${s.code}</span></div>
      <div class="stock-name">${s.name}</div>
      <div class="price-loading">載入中...</div>
    </div>`
  ).join('');

  for (const stock of WATCH_STOCKS) {
    const card = document.getElementById(`card-${stock.code}`);
    const rawData = await fetchPrice(stock.code);

    if (rawData && rawData.length > 0) {
      const latest = rawData[rawData.length - 1];
      const prev = rawData.length > 1 ? rawData[rawData.length - 2].close : latest.close;
      const price = latest.close;
      const change = price - prev;
      const changePct = prev ? ((change / prev) * 100) : 0;
      const changeClass = change > 0 ? 'change-up' : change < 0 ? 'change-down' : 'change-flat';
      const changeSymbol = change > 0 ? '▲' : change < 0 ? '▼' : '－';

      priceCache[stock.code] = { rawData, price };

      card.onclick = () => openStockModal(stock);
      card.innerHTML = `
        <div style="margin-bottom:4px;"><span class="stock-code">${stock.code}</span></div>
        <div class="stock-name">${stock.name}</div>
        <div class="stock-price">${price.toFixed(2)}</div>
        <div class="stock-change ${changeClass}">
          ${changeSymbol} ${Math.abs(change).toFixed(2)}
          <span style="font-size:11px">(${changePct >= 0 ? '+' : ''}${changePct.toFixed(2)}%)</span>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px;font-family:'Share Tech Mono',monospace;">H ${latest.max.toFixed(2)} · L ${latest.min.toFixed(2)}</div>
        <div style="font-size:10px;color:var(--text2);margin-top:4px;">${latest.date} ${open ? '即時' : '收盤'}</div>
        <div class="analyze-hint">點擊 AI 分析 →</div>
      `;
    } else {
      card.innerHTML = `
        <div style="margin-bottom:4px;"><span class="stock-code">${stock.code}</span></div>
        <div class="stock-name">${stock.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:8px;">資料載入失敗</div>
      `;
    }
  }

  const now = new Date();
  document.getElementById('last-update').textContent = `最後更新：${now.toLocaleTimeString('zh-TW')}`;
}

function filterStock(ticker) {
  currentFilter = ticker;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === ticker);
  });
  renderTable(allData);
}

function renderTable(data) {
  const filtered = currentFilter === '全部' ? data : data.filter(row => row.ticker === currentFilter);
  const container = document.getElementById('table-container');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">尚無警報記錄，等待 TradingView 觸發訊號...</div>';
    return;
  }

  const rows = filtered.slice().reverse().map(row => {
    const rsi = parseFloat(row.rsi);
    const rsiWidth = isNaN(rsi) ? 0 : Math.min(100, Math.max(0, rsi));
    const rsiColor = getRsiColor(rsi);
    const badgeClass = getBadgeClass(row.signal);
    const shortAnalysis = row.analysis ? row.analysis.substring(0, 200) + (row.analysis.length > 200 ? '...' : '') : '-';

    return `<tr>
      <td><span class="time-text">${row.time || '-'}</span></td>
      <td><span class="ticker">${row.ticker || '-'}</span></td>
      <td><span class="price-text">${row.price ? parseFloat(row.price).toFixed(2) : '-'}</span></td>
      <td>
        <div class="rsi-bar">
          <span class="time-text" style="min-width:32px">${isNaN(rsi) ? '-' : rsi.toFixed(1)}</span>
          <div class="rsi-track"><div class="rsi-fill" style="width:${rsiWidth}%;background:${rsiColor}"></div></div>
        </div>
      </td>
      <td><span class="badge ${badgeClass}">${row.signal || '-'}</span></td>
      <td><div class="analysis-text">${shortAnalysis}</div></td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <table>
      <thead><tr>
        <th>時間</th><th>股票</th><th>警報價格</th><th>RSI</th><th>訊號</th><th>Claude 分析</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function updateMetrics(data) {
  document.getElementById('total-count').textContent = data.length;
  document.getElementById('buy-count').textContent = data.filter(r => r.signal && r.signal.includes('進場')).length;
  document.getElementById('sell-count').textContent = data.filter(r => r.signal && r.signal.includes('出場')).length;
  document.getElementById('trend-count').textContent = data.filter(r => r.signal && (r.signal.includes('趨勢') || r.signal.includes('風險'))).length;
}

function updateFilters(data) {
  const tickers = [...new Set(data.map(r => r.ticker).filter(Boolean))];
  const filterDiv = document.getElementById('stock-filter');
  filterDiv.innerHTML = `<button class="filter-btn ${currentFilter === '全部' ? 'active' : ''}" onclick="filterStock('全部')">全部</button>`;
  tickers.forEach(ticker => {
    filterDiv.innerHTML += `<button class="filter-btn ${currentFilter === ticker ? 'active' : ''}" onclick="filterStock('${ticker}')">${ticker}</button>`;
  });
}

async function loadAlerts() {
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table.rows;

    if (!rows || rows.length === 0) {
      allData = [];
      renderTable([]);
      updateMetrics([]);
      return;
    }

    allData = rows.map(row => ({
      time: row.c[0]?.f || row.c[0]?.v || '',
      ticker: row.c[1]?.v || '',
      price: row.c[2]?.v || '',
      rsi: row.c[3]?.v || '',
      signal: row.c[4]?.v || '',
      analysis: row.c[5]?.v || ''
    })).filter(r => r.ticker || r.signal);

    updateMetrics(allData);
    updateFilters(allData);
    renderTable(allData);
  } catch (err) {
    document.getElementById('table-container').innerHTML =
      `<div class="error-msg">警報記錄載入失敗<br><small>${err.message}</small></div>`;
  }
}

async function init() {
  await loadPrices();
  await loadAlerts();
}

init();
setInterval(loadPrices, isMarketOpen() ? 30000 : 300000);
setInterval(loadAlerts, 60000);
</script>
</body>
</html>
