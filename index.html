<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市戰情室 v5.2H</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root {
  --bg: #0a0e1a;
  --bg2: #0f1525;
  --bg3: #141c30;
  --card: #111827;
  --border: #1e2d4a;
  --border2: #243552;
  --accent: #3b82f6;
  --accent2: #1d4ed8;
  --green: #10b981;
  --green2: #059669;
  --red: #ef4444;
  --yellow: #f59e0b;
  --purple: #8b5cf6;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景網格 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container { max-width: 1400px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

/* 頂部 Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
  background: rgba(10,14,26,0.95);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-badge {
  background: var(--accent);
  color: white;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
}
.logo h1 {
  font-family: var(--mono);
  font-size: 16px;
  color: var(--text);
  letter-spacing: 1px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.market-badge {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid;
}
.market-open { border-color: var(--green); color: var(--green); background: rgba(16,185,129,0.08); }
.market-closed { border-color: var(--text3); color: var(--text3); background: rgba(100,116,139,0.08); }
.update-time { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.refresh-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--sans);
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 統計列 */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 20px 0;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.stat-card.blue::before { background: var(--accent); }
.stat-card.green::before { background: var(--green); }
.stat-card.red::before { background: var(--red); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; margin-bottom: 6px; }
.stat-num { font-family: var(--mono); font-size: 24px; font-weight: 700; }
.stat-card.blue .stat-num { color: var(--accent); }
.stat-card.green .stat-num { color: var(--green); }
.stat-card.red .stat-num { color: var(--red); }
.stat-card.yellow .stat-num { color: var(--yellow); }

/* 股票網格 */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.alert-badge {
  font-size: 11px;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--mono);
}

.stocks-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}

/* 股票卡片 */
.stock-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0;
  cursor: pointer;
  transition: all 0.25s;
  overflow: hidden;
  position: relative;
}
.stock-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(59,130,246,0.12);
}
.stock-card.has-alert { border-color: rgba(59,130,246,0.4); }

.card-top {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
}
.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}
.stock-code {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
}
.stock-name { font-size: 13px; font-weight: 500; color: var(--text); }
.alert-dot {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s infinite;
  flex-shrink: 0;
  margin-top: 3px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.price-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.price { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--text); }
.change { font-family: var(--mono); font-size: 12px; }
.change.up { color: var(--red); }
.change.down { color: var(--green); }
.change.flat { color: var(--text3); }

/* 指標區 */
.card-indicators {
  padding: 10px 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.ind-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
}
.ind-label { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.ind-val { font-size: 11px; font-family: var(--mono); font-weight: 700; }
.ind-val.bull { color: var(--red); }
.ind-val.bear { color: var(--green); }
.ind-val.neutral { color: var(--text2); }

/* 評分條 */
.score-section {
  padding: 8px 14px 12px;
  border-top: 1px solid var(--border);
}
.score-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.score-label { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.5px; }
.score-num {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
}
.score-bar-bg {
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.score-bar { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

/* 訊號標籤 */
.signal-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.sig-tag {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.5px;
}
.sig-buy { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
.sig-buy-star { background: rgba(16,185,129,0.25); color: #34d399; border: 1px solid rgba(16,185,129,0.5); }
.sig-pb { background: rgba(59,130,246,0.15); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
.sig-div { background: rgba(139,92,246,0.15); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }
.sig-sell { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.sig-stop { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
.sig-watch { background: rgba(100,116,139,0.15); color: var(--text3); border: 1px solid rgba(100,116,139,0.3); }

/* 產業標籤 */
.industry-tag {
  font-size: 10px;
  color: var(--text3);
  padding-top: 6px;
  border-top: 1px solid var(--border);
  padding-left: 14px;
  padding-right: 14px;
  padding-bottom: 8px;
}

/* 警報記錄區 */
.alerts-section { margin-bottom: 40px; }
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.filter-btn {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(59,130,246,0.08);
}

.table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: var(--bg3); }
th {
  padding: 10px 14px;
  text-align: left;
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
  letter-spacing: 1px;
  font-weight: 400;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 10px 14px;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.td-time { font-family: var(--mono); font-size: 11px; color: var(--text3); white-space: nowrap; }
.td-ticker { font-family: var(--mono); font-weight: 700; color: var(--accent); }
.td-price { font-family: var(--mono); }
.td-signal { }
.td-analysis { font-size: 11px; color: var(--text2); line-height: 1.5; max-width: 400px; }

/* 分析 Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  width: 100%;
  max-width: 520px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-family: var(--mono); font-size: 14px; color: var(--text); }
.modal-close {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 18px; line-height: 1;
  transition: color 0.2s;
}
.modal-close:hover { color: var(--text); }
.modal-body { padding: 16px 20px; }
.modal-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.info-item {
  background: var(--bg3);
  border-radius: 6px;
  padding: 8px 10px;
}
.info-item-label { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-bottom: 2px; }
.info-item-val { font-family: var(--mono); font-size: 14px; font-weight: 700; }

.score-display {
  background: var(--bg3);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 14px;
}
.score-display-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.score-display-label { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.score-display-num { font-family: var(--mono); font-size: 20px; font-weight: 700; }
.score-display-bar-bg {
  height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.score-display-bar { height: 100%; border-radius: 3px; }

.analyze-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--sans);
  margin-bottom: 12px;
}
.analyze-btn:hover { background: var(--accent2); }
.analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.analysis-result {
  background: var(--bg3);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text2);
  white-space: pre-wrap;
  margin-top: 8px;
}

.loading-spinner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 20px;
  color: var(--text3);
  font-size: 13px;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.footer {
  text-align: center;
  padding: 20px;
  font-size: 11px;
  color: var(--text3);
  border-top: 1px solid var(--border);
  margin-top: 20px;
}

@media (max-width: 900px) {
  .stocks-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 500px) {
  .stocks-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-badge">v5.2H</span>

  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">股票分析</span>
      <button class="modal-close" onclick="closeModal()">✕</button>

    <div class="modal-body">

      <div class="score-display" id="modal-score"></div>

        🤖 Claude AI 即時分析 → Telegram

</div>

<script>
// ── 設定 ──────────────────────────────────────
const SHEET_ID   = '1YLdYoXehvpHA_PT5wT-qw2qnPFY1jPA4uape1HCVHEc';
const SHEET_NAME = 'Sheet1';
const WEBHOOK    = 'https://hook.us2.make.com/7giwak8asrrvcpbwqfqpncf16cp8yhmz';
const SHEET_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

// ── 新監控名單（8檔）──────────────────────────
const STOCKS = [
  { code:'3563', name:'牧德',       industry:'PCB/半導體AOI檢測設備',   alert:false, sector:'設備' },
  { code:'6456', name:'GIS-KY',     industry:'觸控顯示模組/AR光學轉型',  alert:false, sector:'顯示' },
  { code:'6672', name:'騰輝電子-KY',industry:'高頻高速PCB特殊材料',      alert:false, sector:'PCB材料' },
  { code:'6706', name:'惠特',       industry:'電子零組件/連接器',        alert:false, sector:'零組件' },
  { code:'3388', name:'崇越電',     industry:'IC通路/半導體材料代理',    alert:true,  sector:'通路' },
  { code:'4772', name:'台特化',     industry:'半導體精密化學材料及特氣', alert:true,  sector:'化材' },
  { code:'5351', name:'鈺創',       industry:'半導體/記憶體IC設計',      alert:true,  sector:'IC設計' },
  { code:'6761', name:'穩得',       industry:'EMC線路保護元件/認證測試', alert:true,  sector:'元件' },
];

// ── 狀態 ──────────────────────────────────────
let priceCache   = {};
let alertsData   = [];
let currentFilter = '全部';
let currentStock  = null;

// ── 市場時間 ──────────────────────────────────
function isMarketOpen() {
  const tw  = new Date(new Date().toLocaleString('en-US', { timeZone:'Asia/Taipei' }));
  const day = tw.getDay();
  const min = tw.getHours()*60 + tw.getMinutes();
  return day >= 1 && day <= 5 && min >= 540 && min <= 810;
}

function updateMarketStatus() {
  const badge = document.getElementById('market-badge');
  if (isMarketOpen()) {
    badge.textContent = '交易中';
    badge.className = 'market-badge market-open';
  } else {
    badge.textContent = '休市中';
    badge.className = 'market-badge market-closed';
  }
}

// ── FinMind 股價 ──────────────────────────────
async function fetchPrice(code) {
  try {
    const today = new Date();
    const start = new Date(today);
    start.setDate(today.getDate() - 10);
    const startStr = start.toISOString().split('T')[0];
    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${code}&start_date=${startStr}&token=`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.data && data.data.length > 0) {
      const arr  = data.data;
      const last = arr[arr.length - 1];
      const prev = arr.length > 1 ? arr[arr.length - 2].close : last.close;
      return {
        price: last.close,
        prev,
        high:  last.max,
        low:   last.min,
        open:  last.open,
        vol:   last.Trading_Volume,
        date:  last.date,
      };
    }
  } catch(e) { /* ignore */ }
  return null;
}

// ── 計算簡易指標（給 Modal 顯示）──────────────
function calcIndicators(p) {
  if (!p) return { rsi:'—', macd:'—', score: 0, signals:[] };

  // 簡易 RSI 估算（僅供參考，以 TradingView 為主）
  const chg = p.price - p.prev;
  const rsiEst = chg > 0 ? Math.min(75, 50 + (chg / p.prev) * 200) :
                            Math.max(25, 50 + (chg / p.prev) * 200);
  const rsi = Math.round(rsiEst * 10) / 10;

  // 簡易成交量比
  const volText = p.vol ? (p.vol / 1000).toFixed(0) + 'K' : '—';

  // 估算評分（簡化版，正式評分以 TradingView v5.2H 為主）
  let score = 50;
  if (chg > 0) score += 10;
  if (rsi > 30 && rsi < 60) score += 10;
  if (p.price > p.open) score += 10;
  score = Math.min(100, Math.max(0, score));

  // 訊號判斷
  const signals = [];
  if (rsi < 30) signals.push({ label:'DIV', cls:'sig-div' });
  else if (chg > 0 && rsi < 55) signals.push({ label:'BUY★', cls:'sig-buy-star' });
  else if (chg > 0) signals.push({ label:'BUY', cls:'sig-buy' });
  if (rsi > 70) signals.push({ label:'SELL', cls:'sig-sell' });
  if (signals.length === 0) signals.push({ label:'觀察', cls:'sig-watch' });

  return { rsi, volText, score, signals, chg };
}

// ── 建立股票卡片 ──────────────────────────────
function renderCards() {
  const grid = document.getElementById('stocks-grid');
  grid.innerHTML = '';

  STOCKS.forEach(s => {
    const p    = priceCache[s.code];
    const ind  = calcIndicators(p);
    const chg  = p ? (p.price - p.prev) : 0;
    const pct  = p ? ((chg / p.prev) * 100).toFixed(2) : null;
    const chgCls = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
    const chgSign = chg > 0 ? '+' : '';

    // 評分顏色
    const scoreColor = ind.score >= 75 ? '#10b981' : ind.score >= 55 ? '#f59e0b' : '#ef4444';

    const card = document.createElement('div');
    card.className = 'stock-card' + (s.alert ? ' has-alert' : '');
    card.onclick   = () => openModal(s, p, ind);

    card.innerHTML = `
      <div class="card-top">
        <div class="card-head">
          <div>
            <div class="stock-code">${s.code}</div>
            <div class="stock-name">${s.name}</div>
          </div>
          ${s.alert ? '<div class="alert-dot"></div>' : ''}
        </div>
        <div class="price-row">
          <span class="price">${p ? p.price.toFixed(1) : '—'}</span>
          ${p ? `<span class="change ${chgCls}">${chgSign}${chg.toFixed(1)} (${chgSign}${pct}%)</span>` : ''}
        </div>
      </div>

      <div class="card-indicators">
        <div class="ind-row">
          <span class="ind-label">RSI</span>
          <span class="ind-val ${ind.rsi > 70 ? 'bull' : ind.rsi < 30 ? 'bear' : 'neutral'}">${ind.rsi}</span>
        </div>
        <div class="ind-row">
          <span class="ind-label">VOL</span>
          <span class="ind-val neutral">${ind.volText || '—'}</span>
        </div>
        <div class="ind-row">
          <span class="ind-label">HIGH</span>
          <span class="ind-val neutral">${p ? p.high.toFixed(1) : '—'}</span>
        </div>
        <div class="ind-row">
          <span class="ind-label">LOW</span>
          <span class="ind-val neutral">${p ? p.low.toFixed(1) : '—'}</span>
        </div>
      </div>

      <div class="score-section">
        <div class="score-head">
          <span class="score-label">v5.2H 進場評分</span>
          <span class="score-num" style="color:${scoreColor}">${ind.score} / 100</span>
        </div>
        <div class="score-bar-bg">
          <div class="score-bar" style="width:${ind.score}%;background:${scoreColor};"></div>
        </div>
        <div class="signal-tags">
          ${ind.signals.map(sig => `<span class="sig-tag ${sig.cls}">${sig.label}</span>`).join('')}
          ${s.alert ? '<span class="sig-tag" style="background:rgba(59,130,246,0.1);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)">⚡警報</span>' : ''}
        </div>
      </div>

      <div class="industry-tag">${s.industry}</div>
    `;

    grid.appendChild(card);
  });
}

// ── Modal ──────────────────────────────────────
function openModal(stock, priceData, ind) {
  currentStock = { stock, priceData, ind };

  document.getElementById('modal-title').textContent = `${stock.code} ${stock.name}`;
  document.getElementById('modal-overlay').style.display = 'flex';

  const p   = priceData;
  const chg = p ? (p.price - p.prev) : 0;
  const pct = p ? ((chg / p.prev) * 100).toFixed(2) : null;
  const chgSign = chg > 0 ? '+' : '';
  const scoreColor = ind.score >= 75 ? '#10b981' : ind.score >= 55 ? '#f59e0b' : '#ef4444';

  document.getElementById('modal-info').innerHTML = `
    <div class="info-item">
      <div class="info-item-label">當前價格</div>
      <div class="info-item-val">${p ? p.price.toFixed(1) : '—'}</div>
    </div>
    <div class="info-item">
      <div class="info-item-label">漲跌幅</div>
      <div class="info-item-val" style="color:${chg>=0?'var(--red)':'var(--green)'}">${p ? `${chgSign}${chg.toFixed(1)} (${chgSign}${pct}%)` : '—'}</div>
    </div>
    <div class="info-item">
      <div class="info-item-label">RSI(14) 估算</div>
      <div class="info-item-val" style="color:${ind.rsi>70?'var(--red)':ind.rsi<30?'var(--green)':'var(--text)'}">${ind.rsi}</div>
    </div>
    <div class="info-item">
      <div class="info-item-label">產業類別</div>
      <div class="info-item-val" style="font-size:11px;color:var(--text2)">${stock.sector}</div>
    </div>
  `;

  document.getElementById('modal-score').innerHTML = `
    <div class="score-display-head">
      <span class="score-display-label">v5.2H 進場評分（參考 TradingView 為主）</span>
      <span class="score-display-num" style="color:${scoreColor}">${ind.score} / 100</span>
    </div>
    <div class="score-display-bar-bg">
      <div class="score-display-bar" style="width:${ind.score}%;background:${scoreColor}"></div>
    </div>
    <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
      ${ind.signals.map(sig => `<span class="sig-tag ${sig.cls}">${sig.label}</span>`).join('')}
    </div>
  `;

  document.getElementById('analyze-btn').disabled = false;
  document.getElementById('analyze-btn').textContent = '🤖 Claude AI 即時分析 → Telegram';
  document.getElementById('analysis-result').style.display = 'none';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

async function runAnalysis() {
  if (!currentStock) return;
  const { stock, priceData, ind } = currentStock;
  const btn = document.getElementById('analyze-btn');
  const resultDiv = document.getElementById('analysis-result');

  btn.disabled = true;
  btn.textContent = '分析中...';
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '<div class="loading-spinner"><div class="spinner"></div>Claude 分析中，請稍候...</div>';

  const payload = {
    ticker:  stock.code,
    price:   priceData ? priceData.price : 0,
    rsi:     ind.rsi,
    signal:  ind.signals.map(s => s.label).join(' / '),
    score:   ind.score,
    pos:     ind.score >= 75 ? '30-40%' : ind.score >= 55 ? '20%' : '觀望',
    time:    new Date().toLocaleString('zh-TW'),
  };

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const text = await res.text();
    resultDiv.innerHTML = `<div class="analysis-result">✅ 分析請求已發送至 Telegram！\n\n股票：${stock.code} ${stock.name}\n價格：${payload.price}\n評分：${payload.score}/100\n建議倉位：${payload.pos}</div>`;
    btn.textContent = '✅ 已發送';
  } catch(e) {
    resultDiv.innerHTML = `<div class="analysis-result" style="color:var(--red)">❌ 發送失敗：${e.message}</div>`;
    btn.disabled = false;
    btn.textContent = '🤖 Claude AI 即時分析 → Telegram';
  }
}

// ── 載入股價 ──────────────────────────────────
async function loadPrices() {
  updateMarketStatus();
  const promises = STOCKS.map(s => fetchPrice(s.code).then(p => { if(p) priceCache[s.code] = p; }));
  await Promise.allSettled(promises);
  renderCards();
  document.getElementById('update-time').textContent = new Date().toLocaleTimeString('zh-TW');
}

// ── 載入警報記錄 ──────────────────────────────
async function loadAlerts() {
  const container = document.getElementById('table-container');
  try {
    const res  = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table?.rows || [];

    if (!rows.length) {
      container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3);font-family:var(--mono);font-size:12px;">尚無警報記錄</div>';
      updateStats([]);
      return;
    }

    alertsData = rows.map(r => ({
      time:     r.c[0]?.f || r.c[0]?.v || '',
      ticker:   r.c[1]?.v || '',
      price:    r.c[2]?.v || '',
      rsi:      r.c[3]?.v || '',
      signal:   r.c[4]?.v || '',
      analysis: r.c[5]?.v || '',
    })).filter(r => r.ticker || r.signal);

    updateStats(alertsData);
    updateFilters(alertsData);
    renderTable(alertsData);
  } catch(e) {
    container.innerHTML = `<div style="padding:40px;text-align:center;color:var(--red);font-size:12px;">載入失敗：確認 Google Sheets 已設為公開</div>`;
  }
}

function updateStats(data) {
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-buy').textContent   = data.filter(d => /進場|BUY/.test(d.signal)).length;
  document.getElementById('stat-sell').textContent  = data.filter(d => /出場|SELL|停損/.test(d.signal)).length;
  document.getElementById('stat-trend').textContent = data.filter(d => /趨勢|交叉/.test(d.signal)).length;
}

function updateFilters(data) {
  const tickers = [...new Set(data.map(d => d.ticker).filter(Boolean))];
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = `<button class="filter-btn ${currentFilter==='全部'?'active':''}" onclick="filterStock('全部')">全部</button>`;
  tickers.forEach(t => {
    bar.innerHTML += `<button class="filter-btn ${currentFilter===t?'active':''}" onclick="filterStock('${t}')">${t}</button>`;
  });
}

function filterStock(ticker) {
  currentFilter = ticker;
  updateFilters(alertsData);
  const filtered = ticker === '全部' ? alertsData : alertsData.filter(d => d.ticker === ticker);
  renderTable(filtered);
}

function getSignalBadge(signal) {
  if (/強力|BUY★/.test(signal)) return `<span class="sig-tag sig-buy-star">${signal}</span>`;
  if (/進場|BUY/.test(signal))   return `<span class="sig-tag sig-buy">${signal}</span>`;
  if (/出場|SELL/.test(signal))  return `<span class="sig-tag sig-sell">${signal}</span>`;
  if (/停損|STOP/.test(signal))  return `<span class="sig-tag sig-stop">${signal}</span>`;
  if (/趨勢|交叉/.test(signal))  return `<span class="sig-tag sig-pb">${signal}</span>`;
  return `<span class="sig-tag sig-watch">${signal}</span>`;
}

function renderTable(data) {
  const container = document.getElementById('table-container');
  if (!data.length) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3);font-size:12px;">沒有符合的記錄</div>';
    return;
  }
  container.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>時間</th><th>股票</th><th>價格</th><th>RSI</th><th>訊號</th><th>Claude 分析</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(d => `
            <tr>
              <td class="td-time">${d.time}</td>
              <td class="td-ticker">${d.ticker}</td>
              <td class="td-price">${d.price}</td>
              <td style="font-family:var(--mono);font-size:12px;">${d.rsi}</td>
              <td>${getSignalBadge(d.signal)}</td>
              <td class="td-analysis">${d.analysis ? d.analysis.substring(0,200)+(d.analysis.length>200?'...':'') : '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ── 主程式 ──────────────────────────────────────
async function loadAll() {
  await loadPrices();
  await loadAlerts();
}

loadAll();
setInterval(loadPrices, isMarketOpen() ? 30000 : 300000);
setInterval(loadAlerts, 60000);
</script>
